<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация — Погребок</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <a href="index.html" class="logo">погребок<span> .fresh</span></a>
        <div class="nav">
            <a href="login.html">войти</a>
            <a href="register.html">регистрация</a>
        </div>
    </div>

    <div class="auth-card">
        <h1>Регистрация</h1>
        <form id="registerForm">
            <div>
                <input type="text" id="last_name" placeholder="Фамилия" required>
                <div class="error-message" id="last_name_error"></div>
            </div>
            <div>
                <input type="text" id="first_name" placeholder="Имя" required>
                <div class="error-message" id="first_name_error"></div>
            </div>
            <div>
                <input type="text" id="patronymic" placeholder="Отчество">
                <div class="error-message" id="patronymic_error"></div>
            </div>
            <div>
                <input type="email" id="email" placeholder="Email" required>
                <div class="error-message" id="email_error"></div>
            </div>
            <div>
                <input type="password" id="password" placeholder="Пароль" required>
                <div class="password-strength" id="passwordStrength"></div>
                <div class="error-message" id="password_error"></div>
            </div>
            <div>
                <input type="password" id="confirm_password" placeholder="Подтверждение пароля" required>
                <div class="error-message" id="confirm_error"></div>
            </div>
            <button type="submit" class="btn-primary btn-full">Зарегистрироваться</button>
        </form>
        <div class="auth-footer">
            <a href="login.html" class="btn-outline btn-small">Уже есть аккаунт? Войти</a>
        </div>
    </div>

    <footer>Погребок — продукты под контролем</footer>
</div>

<script src="main.js"></script>
</body>
</html>
