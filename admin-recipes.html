<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление рецептами — Админ-панель</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <a href="index.html" class="logo">погребок<span> .fresh</span></a>
        <div class="nav">
            <button id="logoutBtn" class="btn-outline">выход</button>
        </div>
    </div>

    <div class="page-header">
        <h1 class="page-title">Управление рецептами</h1>
        <button class="btn-primary" onclick="window.location.href='admin-add-recipe.html'">+ добавить рецепт</button>
    </div>

    <div id="adminRecipesContainer" class="recipes-grid"></div>

    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3 id="confirmModalTitle">Подтверждение</h3>
            <p id="confirmModalMessage"></p>
            <div class="modal-buttons">
                <button class="btn-outline" id="confirmModalCancel">Отмена</button>
                <button class="btn-primary" id="confirmModalOk">OK</button>
            </div>
        </div>
    </div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <h3 id="infoModalTitle">Сообщение</h3>
            <p id="infoModalMessage"></p>
            <div class="modal-buttons">
                <button class="btn-primary" id="infoModalOk">Хорошо</button>
            </div>
        </div>
    </div>

    <footer>Погребок — продукты под контролем</footer>
</div>

<script src="main.js"></script>
<script>
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser || currentUser.role !== 'admin') {
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
